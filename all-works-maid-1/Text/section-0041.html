<body>
  <p class="P_Prose_Formatting" id="auto_bookmark_toc_41"><span class="C_Current__And__Times_New_Roman">Unless, of course, something threw her into such a rage that the magic surged out of her control. Like right now, as a matter of fact.</span></p>

  <p class="P_Prose_Formatting"><span class="C_Current__And__Times_New_Roman">“You’re not going </span><span class="C_Current__And__Times_New_Roman__And__Italic">anywhere</span><span class="C_Current__And__Times_New_Roman">!”</span></p>

  <p class="P_Prose_Formatting"><span class="C_Current__And__Times_New_Roman">The Dark One whimpered like the pup it was.</span></p>

  <p class="P_Prose_Formatting"><span class="C_Current__And__Times_New_Roman">A wild and very angry maid had appeared. There was no escape.</span></p>
